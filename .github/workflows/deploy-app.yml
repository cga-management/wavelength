# Platform pull-and-deploy for an onboarded app.
#
# The onboarding user never touches GCP. They get their app into a PRIVATE repo in the org
# (with a Dockerfile + an iac/ stack from the onboard-app skill, iap-lb vendored in) and
# push. An operator then runs THIS workflow (from the Wavelength repo) to pull that repo and
# deploy it, using the platform's federated CI identity - no human keys, no app-side gcloud.
#
# It authenticates as the existing bootstrap WIF identity (token = THIS repo, which the WIF
# provider already trusts), so no WIF/security change was needed to enable app deploys.
#
# ---- One-time operator setup -------------------------------------------------
#  Repo VARIABLES on this repo (bootstrap.sh printed the first four):
#    GCP_PROJECT_ID, GCP_PROJECT_NUMBER, GCP_WIF_PROVIDER, GCP_SERVICE_ACCOUNT,
#    GCP_STATE_BUCKET            (the tofu state bucket, e.g. wl-tfstate-<token>)
#    GCP_REGION (default europe-west2), GCP_WORKLOAD (default wl), GCP_ENVIRONMENT (default platform)
#  Repo SECRET:
#    APP_REPO_TOKEN             a fine-grained PAT or GitHub App token with contents:read on
#                              the org's app repos (the default GITHUB_TOKEN cannot read
#                              another private repo).
# ---- Per-app prerequisites (before first deploy of that app) ------------------
#  - No DB carve-out: the app stack self-provisions its database, its own DB user, and
#    the <slug>-database-url secret on the first apply (see the onboard-app skill's
#    app-stack/database.tf; one-time hardening SQL in references/db-hardening.md).
#  - Any API-key secrets seeded in Secret Manager (values supplied out of band).
#  - The app repo is private in the org and contains a root Dockerfile + iac/ (iap-lb vendored).
#    Apps living in a subdirectory of their repo (e.g. the portal as portal-gcp/ inside the
#    platform repo) set context_dir; the default "." keeps the root-layout behaviour.

name: deploy-app
# The run list shows which app each run deploys instead of N identical "deploy-app" rows.
run-name: "deploy ${{ inputs.app_slug }} (${{ inputs.app_repo }}@${{ inputs.ref }})"

on:
  workflow_dispatch:
    inputs:
      app_repo:
        description: "App repo to deploy, e.g. <your-org>/myapp"
        required: true
      ref:
        description: "Git ref (branch/tag/sha) to deploy"
        required: true
        default: main
      app_slug:
        description: "App slug - the db name, image name, and state-prefix suffix (gcp-<slug>)"
        required: true
      app_hostname:
        description: "Public hostname, e.g. myapp.labs.example.com"
        required: true
      app_owner_email:
        description: "Deploying dev's email (the app owner / admin)"
        required: true
      image_tag:
        description: "Image tag; leave blank to use the commit SHA (recommended, so redeploys roll a new revision)"
        required: false
        default: ""
      context_dir:
        description: "Directory inside the app repo holding the Dockerfile and iac/ (default: the repo root). Set for subdirectory apps, e.g. portal-gcp"
        required: false
        default: "."

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

# One deploy per app at a time: a second dispatch for the same slug would race the tofu
# state between the two apply phases. Queued, not cancelled (a deploy must run to completion).
concurrency:
  group: deploy-app-${{ inputs.app_slug }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Dispatch inputs are routed through env vars rather than interpolated into run: scripts
    # with ${{ }} so a crafted input value is data, never shell. Matters once deploys are
    # dispatched from a portal UI whose card fields are user-typed (see docs/portal.md).
    env:
      REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
      WORKLOAD: ${{ vars.GCP_WORKLOAD || 'wl' }}
      ENVIRONMENT: ${{ vars.GCP_ENVIRONMENT || 'platform' }}
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      STATE_BUCKET: ${{ vars.GCP_STATE_BUCKET }}
      APP_SLUG: ${{ inputs.app_slug }}
      APP_HOSTNAME: ${{ inputs.app_hostname }}
      APP_OWNER_EMAIL: ${{ inputs.app_owner_email }}
      IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
      APP_REPO: ${{ inputs.app_repo }}
      APP_REF: ${{ inputs.ref }}
      CONTEXT_DIR_INPUT: ${{ inputs.context_dir }}
    steps:
      - name: Preflight - validate and normalise context_dir
        # context_dir is a user-typed path that later scopes file checks, the docker build
        # context, and the tofu -chdir directory inside the checkout. Reject anything that
        # could escape the checkout (traversal, absolute paths, backslashes) before any
        # other step consumes it. The normalised value is exported as CONTEXT_DIR.
        run: |
          set -euo pipefail
          CONTEXT_DIR="${CONTEXT_DIR_INPUT:-.}"
          case "${CONTEXT_DIR}" in
            *..*|/*|*\\*)
              echo "::error::context_dir '${CONTEXT_DIR_INPUT}' is invalid - it must be a relative path inside the app repo, with no '..', no leading '/', and no backslashes."
              exit 1
              ;;
          esac
          # Whitelist the characters (also blocks whitespace and newlines, so the value
          # cannot smuggle extra variables into the GITHUB_ENV write below).
          if ! [[ "${CONTEXT_DIR}" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::context_dir '${CONTEXT_DIR_INPUT}' contains unsupported characters - only letters, digits, '.', '_', '-' and '/' are allowed."
            exit 1
          fi
          # Strip one trailing slash so "portal-gcp/" and "portal-gcp" are equivalent.
          CONTEXT_DIR="${CONTEXT_DIR%/}"
          [ -n "${CONTEXT_DIR}" ] || CONTEXT_DIR="."
          echo "CONTEXT_DIR=${CONTEXT_DIR}" >> "$GITHUB_ENV"

      - name: Preflight - platform repo configuration
        # Repo variables live outside git and CAN go missing (recreated repo, org
        # migration, accidental deletion). Without this check the run dies inside the
        # auth action with a generic credentials error; fail first and name the fix.
        env:
          WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          APP_REPO_TOKEN_SET: ${{ secrets.APP_REPO_TOKEN != '' }}
        run: |
          set -euo pipefail
          missing=""
          [ -n "${PROJECT_ID}" ]      || missing="${missing} GCP_PROJECT_ID"
          [ -n "${STATE_BUCKET}" ]    || missing="${missing} GCP_STATE_BUCKET"
          [ -n "${WIF_PROVIDER}" ]    || missing="${missing} GCP_WIF_PROVIDER"
          [ -n "${SERVICE_ACCOUNT}" ] || missing="${missing} GCP_SERVICE_ACCOUNT"
          if [ -n "${missing}" ]; then
            echo "::error::missing repo variable(s):${missing}. bootstrap.sh prints all of them at the end of its run - re-set them on this repo (Settings > Secrets and variables > Actions > Variables, or gh variable set)."
            exit 1
          fi
          if [ "${APP_REPO_TOKEN_SET}" != "true" ]; then
            echo "::error::the APP_REPO_TOKEN repo secret is not set - the workflow cannot check out app repos without it (fine-grained token, contents:read on the org's app repos; see docs/deploy-app-workflow.md)."
            exit 1
          fi

      - name: Preflight - the ref exists in the app repo
        # Fails fast with a clear message instead of the checkout action's cryptic git
        # retry loop. commits/<ref> resolves a branch, tag, or sha alike - which is why
        # the API (not git ls-remote) backs both branches below: a bare commit sha is
        # not an advertised ref, so ls-remote would never find it, but the commits API
        # resolves it fine, and actions/checkout accepts a sha as its ref.
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${APP_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            # Pinned commit sha (the portal's "deploy a previous head" action). Verify
            # the exact commit exists in the app repo; the branch-flavoured error below,
            # with its rename-to-main recipe, would only mislead here.
            RESOLVED="$(gh api "repos/${APP_REPO}/commits/${APP_REF}" --jq .sha 2>/dev/null || true)"
            if [ "${RESOLVED}" != "${APP_REF}" ]; then
              echo "::error::commit '${APP_REF}' does not exist in ${APP_REPO}. A pinned-sha deploy needs the full 40-char sha of a commit still reachable in the app repo (a force-push or branch deletion can strand old heads)."
              exit 1
            fi
          elif ! gh api "repos/${APP_REPO}/commits/${APP_REF}" --jq .sha >/dev/null 2>&1; then
            DEFAULT="$(gh api "repos/${APP_REPO}" --jq .default_branch 2>/dev/null || echo unknown)"
            echo "::error::ref '${APP_REF}' does not exist in ${APP_REPO} (default branch: '${DEFAULT}'). Fix the card's ref, or rename the app repo's branch to main (git branch -m master main; git push -u origin main; gh repo edit ${APP_REPO} --default-branch main)."
            exit 1
          fi

      - name: Check out the app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.app_repo }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app

      - name: Preflight - the repo is onboarded
        # A card can be registered (and a deploy pressed) before the repo has been through
        # the onboard-app skill. Catch that here with actionable errors instead of failing
        # later at docker build or tofu init. (Happened on the first third-party app.)
        run: |
          set -euo pipefail
          fail=0
          if [ ! -f "app/${CONTEXT_DIR}/Dockerfile" ]; then
            echo "::error::${APP_REPO}@${APP_REF} has no Dockerfile in '${CONTEXT_DIR}/' (context_dir '${CONTEXT_DIR}') - the app is not onboarded. Run the onboard-app skill (steps 1-7) and push before deploying."
            fail=1
          fi
          # The iap-lb module is normally vendored inside the app's iac/. A subdirectory app
          # in the platform repo (context_dir set, e.g. portal-gcp) may instead reference the
          # in-repo module at the repo root, so accept either location.
          if [ ! -f "app/${CONTEXT_DIR}/iac/modules/iap-lb/main.tf" ] && [ ! -f app/iac/modules/iap-lb/main.tf ]; then
            echo "::error::${APP_REPO}@${APP_REF} is missing the iac/ stack or the iap-lb module (looked for '${CONTEXT_DIR}/iac/modules/iap-lb/main.tf', then 'iac/modules/iap-lb/main.tf' at the repo root). Complete onboard-app step 6: copy the three module files from the platform repo and COMMIT them."
            fail=1
          fi
          exit "$fail"

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Resolve image tag
        run: |
          set -euo pipefail
          # Tag by the checked-out commit SHA (unless an explicit tag was given). A changing
          # tag is what makes tofu see a new image ref and roll a new Cloud Run revision on
          # redeploy; a static tag would leave updated code un-deployed.
          if [ -n "${IMAGE_TAG_INPUT}" ]; then
            TAG="${IMAGE_TAG_INPUT}"
          else
            TAG="$(git -C app rev-parse --short HEAD)"
          fi
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Build and push the image (docker on the runner)
        # Built on the runner rather than via Cloud Build: gcloud builds submit needs the
        # compute default SA to read the build-source staging bucket, which it can't in this
        # project, so submissions fail. A local docker build+push needs only AR write on the
        # CI identity and drops the Cloud Build dependency entirely.
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          AR="${REGION}-docker.pkg.dev/${PROJECT_ID}/ar-${WORKLOAD}-${ENVIRONMENT}"
          IMAGE="${AR}/${APP_SLUG}:${IMAGE_TAG}"
          echo "Building ${IMAGE} from app/${CONTEXT_DIR} (Dockerfile at the context root)"
          docker build -t "${IMAGE}" "app/${CONTEXT_DIR}"
          docker push "${IMAGE}"

      - name: Pre-migration DB export (rollback point)
        # App migrations run when the new Cloud Run revision boots (during the tofu
        # applies below), so this is the last moment the schema is untouched. Restoring
        # an instance backup would roll back EVERY app on the shared Cloud SQL, hence a
        # per-database export: if this app's migration goes bad, import just its dump.
        # Runner IAM: needs cloudsql.instances.export (covered by the roles/cloudsql.admin
        # grant in iac/bootstrap/gcp/bootstrap.sh). The object write itself is done by the
        # INSTANCE service account, which iac/gcp grants roles/storage.objectAdmin on the
        # export bucket.
        run: |
          set -euo pipefail
          # App db name = slug with hyphens mapped to underscores (the onboard-app
          # app-stack convention: Postgres identifiers use underscores).
          DB_NAME="${APP_SLUG//-/_}"

          INSTANCE="$(gcloud sql instances list --project "${PROJECT_ID}" \
            --filter "name~^psql-${WORKLOAD}-shared" --format 'value(name)')"
          if [ -z "${INSTANCE}" ] || [ "$(wc -l <<<"${INSTANCE}")" -ne 1 ]; then
            echo "::error::expected exactly one psql-${WORKLOAD}-shared-* instance in ${PROJECT_ID}, found: '${INSTANCE}'"
            exit 1
          fi

          # Same token derivation as iac/gcp/main.tf local.instance_id (and bootstrap.sh):
          # sha1 of "<project_id>-<workload>", first 8 chars. Yields the exact bucket name
          # the landing zone creates, with no storage list permission needed.
          TOKEN="$(printf '%s' "${PROJECT_ID}-${WORKLOAD}" | sha1sum | cut -c1-8)"
          BUCKET="${WORKLOAD}-db-pre-deploy-${TOKEN}"

          # First deploy of an app: its stack has not created the database yet, so there
          # is nothing to roll back to. Skip, do not fail.
          if ! gcloud sql databases list --instance "${INSTANCE}" --project "${PROJECT_ID}" \
              --format 'value(name)' | grep -Fxq "${DB_NAME}"; then
            echo "Database ${DB_NAME} does not exist on ${INSTANCE} yet (first deploy of ${APP_SLUG}) - skipping export"
            exit 0
          fi

          OBJECT="gs://${BUCKET}/pre-deploy/${APP_SLUG}/${IMAGE_TAG}-$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
          echo "Exporting ${DB_NAME} to ${OBJECT}"
          # Fail closed: an existing database with no fresh rollback point must not deploy,
          # so a failed export fails the job before the tofu applies run.
          # No --offload: serverless export pays a fixed multi-minute spin-up per run,
          # which dwarfs the inline dump (seconds at current sizes). Reconsider offload
          # only if an app's database grows enough for an inline dump to load the
          # shared instance.
          gcloud sql export sql "${INSTANCE}" "${OBJECT}" \
            --database "${DB_NAME}" --project "${PROJECT_ID}"

          # Stamp provenance onto the fresh dump. gcloud sql export cannot set object
          # metadata at write time, so it is a post-stamp on the object just created.
          # The portal joins github_run_id to its deployments table to pair each backup
          # with the deploy that took it, and restore-app-db.yml is dispatched against
          # these objects - an unstamped dump is unusable downstream, so a failed stamp
          # fails the job (fail closed) even though the export itself succeeded.
          DEPLOYED_SHA="$(git -C app rev-parse HEAD)"
          gcloud storage objects update "${OBJECT}" --custom-metadata \
            "deployed_sha=${DEPLOYED_SHA},deployed_ref=${APP_REF},github_run_id=${GITHUB_RUN_ID},app_slug=${APP_SLUG}"

      - name: Deploy the stack (tofu, two-phase for the IAP audience)
        # The stack directory comes from the user-typed context_dir, so it is addressed via
        # -chdir with the env-indirected CONTEXT_DIR rather than a working-directory that
        # would interpolate the raw input.
        run: |
          set -euo pipefail
          STACK_DIR="app/${CONTEXT_DIR}/iac"
          tofu -chdir="${STACK_DIR}" init -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="prefix=gcp-${APP_SLUG}"

          COMMON=(
            -input=false -auto-approve
            -var "project_id=${PROJECT_ID}"
            -var "region=${REGION}"
            -var "state_bucket=${STATE_BUCKET}"
            -var "app_hostname=${APP_HOSTNAME}"
            -var "app_owner_email=${APP_OWNER_EMAIL}"
            -var "image_tag=${IMAGE_TAG}"
          )

          # Phase 1: create everything; IAP audience empty (app fails closed until phase 2).
          tofu -chdir="${STACK_DIR}" apply "${COMMON[@]}" -var "iap_audience="

          # Phase 2: the LB backend now exists; the stack computes the correct IAP audience
          # (from the numeric backend id). Read it and re-apply so the app verifies tokens.
          AUD="$(tofu -chdir="${STACK_DIR}" output -raw computed_iap_audience)"
          tofu -chdir="${STACK_DIR}" apply "${COMMON[@]}" -var "iap_audience=${AUD}"

      - name: Summary
        run: |
          set -euo pipefail
          STACK_DIR="app/${CONTEXT_DIR}/iac"
          echo "### Deployed ${APP_SLUG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- host: https://${APP_HOSTNAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- lb ip: $(tofu -chdir="${STACK_DIR}" output -raw lb_ip_address)" >> "$GITHUB_STEP_SUMMARY"
          echo "The managed cert provisions once DNS resolves (~15-60 min on first deploy)." >> "$GITHUB_STEP_SUMMARY"
